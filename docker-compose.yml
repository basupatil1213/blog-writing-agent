services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blog_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MinIO (S3-compatible object storage for AI-generated images) ──────────
  minio:
    image: minio/minio:latest
    container_name: blog_agent_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI  →  http://localhost:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
